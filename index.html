<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wayfound.in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0B1120;
    --bg-panel: #101828;
    --line: #1F2A3D;
    --text: #E8ECF4;
    --muted: #8891A6;
    --accent: #D4A857;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }

  .card {
    width: 100%;
    max-width: 460px;
    text-align: center;
    animation: rise 0.7s ease-out both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .route {
    display: block;
    margin: 0 auto 32px;
    width: 220px;
    height: 64px;
  }

  .route path {
    fill: none;
    stroke: var(--muted);
    stroke-width: 1.5;
    stroke-dasharray: 4 6;
    stroke-linecap: round;
  }

  .route circle.origin {
    fill: var(--muted);
  }

  .route circle.pin {
    fill: var(--accent);
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 2.4rem;
    letter-spacing: -0.01em;
    color: var(--text);
  }

  .domain {
    color: var(--accent);
  }

  p.tagline {
    margin-top: 14px;
    color: var(--muted);
    font-size: 1rem;
    line-height: 1.6;
  }

  .divider {
    width: 32px;
    height: 1px;
    background: var(--line);
    margin: 32px auto;
  }

  .status {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    border: 1px solid var(--line);
    border-radius: 100px;
    background: var(--bg-panel);
    font-size: 0.85rem;
    color: var(--muted);
  }

  .status .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }

  footer {
    margin-top: 40px;
    color: var(--muted);
    font-size: 0.78rem;
    letter-spacing: 0.02em;
  }

  @media (prefers-reduced-motion: reduce) {
    .card { animation: none; }
  }
</style>
</head>
<body>
  <main class="card">
    <svg class="route" viewBox="0 0 220 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M10 46 C 60 46, 60 12, 110 12 S 170 46, 210 20" />
      <circle class="origin" cx="10" cy="46" r="4"></circle>
      <circle class="pin" cx="210" cy="20" r="5"></circle>
    </svg>

    <h1>way<span class="domain">found</span></h1>
    <p class="tagline">This domain is owned and operated by the Wayfound team.</p>

    <div class="divider"></div>

    <span class="status"><span class="dot"></span>Verified domain owner</span>

    <footer>wayfound.in &middot; est. 2026</footer>
  </main>
</body>
</html>
